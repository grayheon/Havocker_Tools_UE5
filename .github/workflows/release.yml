name: Unified Workspace Release

on:
  push:
    branches:
      - main

jobs:
  unified-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Extract version and tag
        id: version
        run: |
          version=$(grep '^version' Archlord-AIO/apps/meta/Cargo.toml | head -n1 | cut -d '"' -f2)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=Archlord-AIO-v$version" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git tag | grep -q "^${{ steps.version.outputs.tag }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build all apps
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cargo build --manifest-path Archlord-AIO/Cargo.toml --release
          mkdir -p release_out
          for path in Archlord-AIO/target/release/*; do
            [ -f "$path" ] && cp "$path" release_out/
          done

      - name: Create Git Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Upload GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Archlord-AIO ${{ steps.version.outputs.version }}
          files: release_out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
