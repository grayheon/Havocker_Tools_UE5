name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build workspace
        run: cargo build --manifest-path Archlord-AIO/Cargo.toml --workspace

      - name: Run tests
        run: cargo test --manifest-path Archlord-AIO/Cargo.toml --workspace