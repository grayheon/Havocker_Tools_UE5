name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build full workspace
        run: cargo build --manifest-path Archlord-AIO/Cargo.toml --workspace --all-targets

      - name: Run tests
        run: cargo test --manifest-path Archlord-AIO/Cargo.toml --workspace --all-targets
